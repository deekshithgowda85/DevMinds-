<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="100%" height="100%" fill="#0b1220" />
  <g font-family="Inter, Arial, Helvetica, sans-serif" fill="#ffffff">
    <text x="60" y="110" font-size="36" font-weight="700">DevMinds — AWS Summary</text>
    <text x="60" y="160" font-size="24" fill="#9fb4d6">Monthly: <tspan font-weight="700" fill="#ffffff">$200 — $1,000</tspan>  •  One-time: <tspan font-weight="700" fill="#ffffff">$1.5k — $5k</tspan></text>

    <g transform="translate(60,210)">
      <text x="0" y="0" font-size="22" font-weight="700">Recommended (fast launch)</text>
      <text x="0" y="36" font-size="20">• Hosting: CloudFront + Lambda / Amplify</text>
      <text x="0" y="66" font-size="20">• DB: Aurora Serverless (Prisma-friendly)</text>
      <text x="0" y="96" font-size="20">• Storage: S3 + CloudFront</text>
    </g>

    <g transform="translate(60,330)">
      <text x="0" y="0" font-size="22" font-weight="700">Key Metrics</text>
      <text x="0" y="36" font-size="20">• P95 latency &lt; 300 ms  •  Error rate &lt; 0.5%</text>
      <text x="0" y="66" font-size="20">• Prototype target: 200–500 RPS</text>
    </g>

    <text x="60" y="520" font-size="16" fill="#9fb4d6">Takeaway: Serverless = faster launch, lower ops</text>

    <text x="980" y="600" font-size="12" fill="#6b7f93" text-anchor="end">Mar 6, 2026</text>
  </g>
</svg>
