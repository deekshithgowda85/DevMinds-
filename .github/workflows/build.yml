name: Build & Lint Check

on:
  push:
    branches:
      - production
      - main
  pull_request:
    branches:
      - production
      - main

jobs:
  build:
    name: Next.js Build
    runs-on: ubuntu-latest

    env:
      # Stub env vars so Next.js can build without real secrets.
      # Real secrets should be stored in GitHub → Settings → Secrets.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      PINECONE_INDEX: ${{ secrets.PINECONE_INDEX }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
      INNGEST_EVENT_KEY: ${{ secrets.INNGEST_EVENT_KEY }}
      INNGEST_SIGNING_KEY: ${{ secrets.INNGEST_SIGNING_KEY }}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ───────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Install dependencies ────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Generate Prisma client ──────────────────────────────
      - name: Generate Prisma client
        run: npx prisma generate

      # ── 5. Lint ────────────────────────────────────────────────
      - name: Lint (npm run lint)
        run: npm run lint

      # ── 6. Build ───────────────────────────────────────────────
      - name: Build (npm run build)
        run: npm run build

      # ── 7. Upload build artefact on failure ───────────────────
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: .next/
          retention-days: 3
